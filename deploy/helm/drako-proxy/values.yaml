replicaCount: 1

image:
  repository: drako/proxy
  tag: "2.0.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8990

config:
  # API key for Drako platform (or use existingSecret)
  apiKey: ""
  # Name of existing Kubernetes secret containing the API key
  existingSecret: ""
  # Key name within the existing secret
  existingSecretKey: "DRAKO_API_KEY"
  # Drako platform endpoint
  endpoint: "https://api.getdrako.com"
  # Governance level: autopilot | balanced | strict | custom
  governanceLevel: "autopilot"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Pod annotations
podAnnotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5

# Custom .drako.yaml content (optional)
# If set, creates a ConfigMap with this content
drakoConfig: ""
