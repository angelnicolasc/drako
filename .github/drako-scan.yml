# Drako Governance Scan — GitHub Action template
#
# Copy this file to your repo at .github/workflows/drako-scan.yml
# to run governance scans on every push and pull request.
#
# Optional: set DRAKO_API_KEY as a repo secret for authenticated uploads
# and a deterministic badge at:
#   https://api.getdrako.com/api/v1/scans/badge/<your-project-name>

name: Drako Governance Scan

on: [push, pull_request]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install drako

      - name: Run Drako scan
        run: drako scan . --format sarif --threshold 60 > results.sarif

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        if: always()
