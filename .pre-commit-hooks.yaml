# Drako pre-commit hook definition
#
# Users add this to their .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/angelnicolasc/drako
#       rev: v0.1.0
#       hooks:
#         - id: drako-scan

- id: drako-scan
  name: Drako Governance Scan
  entry: drako scan . --fail-on critical
  language: python
  additional_dependencies: ["drako"]
  pass_filenames: false
  always_run: true
