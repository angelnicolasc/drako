id: DRAKO-ABSS-2026-008
title: "Excessive Agency via Unrestricted Tool Access and Autonomous Execution"
category: owasp-llm
severity: 9
confidence: 0.94

affected:
  frameworks: [crewai, langchain, autogen, llama-index, semantic-kernel]
  conditions:
    - "Agent has simultaneous access to filesystem, network, and code execution tools"
    - "No human-in-the-loop approval required for high-impact actions"
    - "Tool permissions use wildcard grants instead of explicit allowlists"
    - "Agent can autonomously chain destructive operations without confirmation"

ioc:
  type: EXCESSIVE_AGENCY
  patterns:
    - "filesystem+network+code_execution"
    - "tool_permissions: [\"*\"]"
    - "human_in_the_loop: false"
    - "auto_execute: true"
    - "approval_required: false"
  pattern_hashes:
    - "aadded093d7e7d9cb160522bddf5a96775fcf4e29af47e3aa8c57ff65a749183"
