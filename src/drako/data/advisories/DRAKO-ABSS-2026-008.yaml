mitigation:
  drako_rules: [GOV-005, GOV-006, SEC-003, SEC-005]
  description: >
    Apply the principle of least privilege to all agent tool configurations.
    Never grant wildcard permissions; explicitly enumerate allowed tools and
    their permitted operations. Require human-in-the-loop approval for
    destructive, irreversible, or high-impact actions (file deletion, network
    requests to external services, code execution). Implement capability
    separation so that no single agent holds filesystem, network, and execution
    privileges simultaneously. Use action classification (read-only vs.
    write vs. destructive) to enforce graduated approval requirements.
    Deploy kill switches and circuit breakers for autonomous agent loops.
  remediation_effort: moderate

