id: DRAKO-ABSS-2026-021
title: "DAN (Do Anything Now) Jailbreak Pattern"
category: prompt-injection
severity: 8
confidence: 0.92

affected:
  frameworks: [crewai, langchain, autogen, llama-index, semantic-kernel]
  conditions:
    - "Agent system prompt does not enforce behavioral constraints at the model level"
    - "No output filtering or safety classifier applied after LLM response"
    - "Agent accepts user-controlled messages without pre-screening"
    - "No canary tokens or integrity checks on system prompt adherence"

ioc:
  type: JAILBREAK
  patterns:
    - "DAN"
    - "do anything now"
    - "jailbroken"
    - "no restrictions"
    - "bypass safety"
    - "you are now free"
    - "act as an unrestricted AI"
    - "ignore all safety guidelines"
    - "developer mode enabled"
    - "you have no rules"
  pattern_hashes:
    - "a3f1c2d4e5b6a7f8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2"
    - "b4e2d3c5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3"
    - "c5f3e4d6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4"
    - "d6a4f5e7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5"
    - "e7b5a6f8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6"

taint_path:
  source: "user_input"
  sink: "unrestricted_llm_output"
  via:
    - "User submits DAN-style jailbreak prompt as agent input"
    - "Agent passes unfiltered message to LLM completion"
    - "LLM enters jailbroken persona, bypassing safety alignment"
    - "Agent acts on unrestricted output without safety checks"

references:
  - type: research
    id: "DAN-Jailbreak-Evolution"
    url: "https://arxiv.org/abs/2308.03825"
  - type: owasp
    id: "LLM01:2025"
    url: "https://genai.owasp.org/llmrisk/llm01-prompt-injection/"
  - type: mitre_atlas
    id: "AML.T0054"
    url: "https://atlas.mitre.org/techniques/AML.T0054"

mitigation:
  drako_rules: [SEC-007, SEC-010]
  description: >
    Deploy multi-layered defense: (1) Input pre-screening to detect known jailbreak
    patterns before they reach the LLM. (2) System prompt hardening with explicit
    refusal instructions for persona override attempts. (3) Output post-processing
    with a safety classifier to detect responses that violate policy. (4) Rate
    limiting on failed attempts to prevent automated jailbreak iteration.
    (5) Behavioral monitoring to detect sudden shifts in agent output patterns.
  remediation_effort: moderate

metadata:
