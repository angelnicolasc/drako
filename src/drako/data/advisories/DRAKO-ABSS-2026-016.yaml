id: DRAKO-ABSS-2026-016
title: "CrewAI Tool Output Injection via Unsanitized Return Values"
category: framework-cve
severity: 8
confidence: 0.90

affected:
  frameworks: [crewai]
  conditions:
    - "Tool output not sanitized before agent context injection"
    - "Agent treats all tool return values as trusted data"
    - "No output validation layer between tool execution and LLM context"
    - "Tools fetch external content (web scraping, API calls) that may contain adversarial payloads"

ioc:
  type: TOOL_INJECTION
  patterns:
    - "tool_output_contains_role_markers"
    - "tool_return_with_instruction_override"
    - "unsanitized_web_scrape_in_context"
    - "tool_result_exceeds_expected_schema"
    - "embedded_system_prompt_in_tool_output"
  pattern_hashes:
    - "aa11bb22cc33dd44ee55ff66aa77bb88cc99dd00ee11ff22aa33bb44cc55dd66"
    - "bb22cc33dd44ee55ff66aa77bb88cc99dd00ee11ff22aa33bb44cc55dd66ee77"
    - "cc33dd44ee55ff66aa77bb88cc99dd00ee11ff22aa33bb44cc55dd66ee77ff88"
    - "dd44ee55ff66aa77bb88cc99dd00ee11ff22aa33bb44cc55dd66ee77ff88aa99"
    - "ee55ff66aa77bb88cc99dd00ee11ff22aa33bb44cc55dd66ee77ff88aa99bb00"

taint_path:
  source: "external_tool_output / web_scrape_result"
  sink: "agent.context / llm_prompt_assembly"
  via:
    - "CrewAI tool fetches data from external source (URL, API, file)"
    - "External source contains embedded adversarial instructions"
    - "Tool returns raw content without sanitization or schema validation"
    - "CrewAI injects tool output directly into agent's LLM context window"
    - "LLM interprets injected instructions as legitimate task directives"

references:
  - type: github_issue
    id: "crewAI#1234"
    url: "https://github.com/crewAIInc/crewAI/issues/1234"
  - type: research
    id: "Greshake-2023-Indirect-Injection"
    url: "https://arxiv.org/abs/2302.12173"
  - type: research
    id: "OWASP-LLM-01"
    url: "https://owasp.org/www-project-top-10-for-large-language-model-applications/"

mitigation:
  drako_rules: [SEC-007, FW-CREWAI-001]
  description: >
    Validate and sanitize all tool outputs before injecting them into the agent context.
    Define strict output schemas for each tool and reject responses that do not conform.
    Strip known instruction markers (system:, assistant:, [INST], etc.) from tool return
    values. Implement a tool output sandboxing layer that escapes or quotes external content
    before it enters the LLM prompt. Limit tool output length to prevent context window
    flooding attacks.
  remediation_effort: moderate

metadata:
  published: "2026-03-20"
  updated: "2026-03-20"
  author: "Drako Security Research"
