# Framework Security Monitor Configuration
# Monitors AI framework repositories for security-relevant changes.

frameworks:
  crewai:
    repo: crewAIInc/crewAI
    paths:
      - src/crewai/tools
      - src/crewai/agents
      - src/crewai/security
      - src/crewai/utilities
    weight: 1.0

  langchain:
    repo: langchain-ai/langchain
    paths:
      - libs/core/langchain_core
      - libs/langchain/langchain/tools
      - libs/langchain/langchain/agents
      - libs/langchain/langchain/chains
    weight: 1.0

  autogen:
    repo: microsoft/autogen
    paths:
      - autogen
      - autogen/agentchat
      - autogen/code_utils.py
    weight: 1.0

  llama_index:
    repo: run-llama/llama_index
    paths:
      - llama-index-core/llama_index/core/tools
      - llama-index-core/llama_index/core/agent
    weight: 0.8

  pydantic_ai:
    repo: pydantic/pydantic-ai
    paths:
      - pydantic_ai
    weight: 0.8

  semantic_kernel:
    repo: microsoft/semantic-kernel
    paths:
      - python/semantic_kernel
    weight: 0.7

# Keywords that indicate security-relevant changes
keywords:
  critical:
    - injection
    - vulnerability
    - CVE
    - security
    - bypass
    - escalation
    - arbitrary
    - remote code execution
    - RCE
  high:
    - unsafe
    - escape
    - sanitize
    - permission
    - authentication
    - authorization
    - privilege
    - exploit
  medium:
    - fix
    - patch
    - validate
    - restrict
    - limit
    - boundary
    - guard

# Monitoring schedule
schedule:
  lookback_days: 7
  max_commits_per_repo: 100
  max_issues_per_repo: 50

# Output
output:
  alerts_dir: alerts
  max_alerts_per_run: 50
  relevance_threshold: 0.3
